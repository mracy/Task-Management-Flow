apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      containers:
        - name: ai-backend
          image: taskflow-ai-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-backend
  namespace: taskflow
spec:
  selector:
    app: ai-backend
  ports:
    - port: 8000
      targetPort: 8000
